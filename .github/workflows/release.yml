name: release

# On a version tag: compile standalone binaries, publish a GitHub Release with
# them attached, then update the Homebrew formula in f5-sales-demo/homebrew-tap.
# Users install prebuilt binaries via brew — never from source.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          openssl pkcs12 -info -in "$RUNNER_TEMP/certificate.p12" -noout \
            -passin pass:"$APPLE_CERTIFICATE_PASSWORD" || {
              echo "::error::Invalid p12 file or wrong APPLE_CERTIFICATE_PASSWORD"; exit 1; }

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/certificate.p12"

      - name: Compile, Developer ID sign, and notarize macOS binaries (arm64 + x64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::No 'Developer ID' identity found in keychain"; exit 1
          fi
          echo "signing identity: $SIGNING_IDENTITY"

          # Retry a command with linear backoff (Apple's timestamp/notary servers are flaky).
          retry() {
            local n=1 max=5
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "::error::command failed after $max attempts: $*"; return 1; fi
              echo "::warning::attempt $n failed, retrying in $((n * 5))s..."; sleep $((n * 5)); n=$((n + 1))
            done
          }

          build() {
            target="$1"; asset="$2"
            echo "=== building $asset ($target) ==="
            bun build ./proxy.mjs --compile --target="$target" --outfile claude-office

            # Strip Bun's own (ad-hoc / malformed) signature, then Developer ID sign
            # with hardened runtime + JIT entitlements and a secure timestamp.
            codesign --remove-signature claude-office 2>/dev/null || true
            retry codesign --force --options runtime \
              --entitlements entitlements.plist \
              --sign "$SIGNING_IDENTITY" --timestamp claude-office
            codesign --verify --verbose claude-office
            codesign -dvvv claude-office 2>&1 | grep -q "Authority=Developer ID Application" || {
              echo "::error::binary is not Developer ID signed"; exit 1; }

            # Flat zip (formula does `bin.install "claude-office"`); this same zip ships.
            zip -j "$asset.zip" claude-office

            # Notarize. A bare Mach-O CLI cannot be stapled, so the ticket is registered
            # with Apple online; Gatekeeper verifies on first run (matches xcsh).
            OUT=$(retry xcrun notarytool submit "$asset.zip" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
              --wait --verbose 2>&1) || { echo "$OUT"; exit 1; }
            echo "$OUT"
            echo "$OUT" | grep -q "status: Accepted" || {
              echo "::error::notarization not Accepted for $asset"; exit 1; }
            xcrun stapler staple claude-office 2>&1 || \
              echo "note: stapling not supported for bare Mach-O CLI tools (expected; ticket is online)"

            rm -f claude-office
          }

          build bun-darwin-arm64 claude-office-darwin-arm64
          build bun-darwin-x64   claude-office-darwin-x64
          ls -la ./*.zip

      - name: Create / update GitHub Release with binaries
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" claude-office-darwin-arm64.zip claude-office-darwin-x64.zip --clobber

      - name: Generate and push Homebrew formula to the tap
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ARM_SHA=$(shasum -a 256 claude-office-darwin-arm64.zip | cut -d' ' -f1)
          X64_SHA=$(shasum -a 256 claude-office-darwin-x64.zip   | cut -d' ' -f1)

          cat > claude-office.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class ClaudeOffice < Formula
            desc "Local CORS proxy so the Claude for Office add-in can use a self-hosted LLM gateway"
            homepage "https://github.com/f5-sales-demo/claude-office"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/f5-sales-demo/claude-office/releases/download/${TAG}/claude-office-darwin-arm64.zip"
                sha256 "${ARM_SHA}"
              else
                url "https://github.com/f5-sales-demo/claude-office/releases/download/${TAG}/claude-office-darwin-x64.zip"
                sha256 "${X64_SHA}"
              end
            end

            def install
              bin.install "claude-office"
            end

            service do
              run [opt_bin/"claude-office", "run"]
              keep_alive true
              log_path var/"log/claude-office.log"
              error_log_path var/"log/claude-office.log"
            end

            def caveats
              <<~EOS
                Quick start (macOS, while on your VPN):

                1. Point it at YOUR gateway (scheme + host only, no path).
                   This also starts the background service automatically:
                     claude-office set-upstream https://your-gateway.example.com

                2. In the Claude for Office add-in, open the Gateway tab and set:
                     Gateway URL:  https://127-0-0-1.local-ip.sh:8443/anthropic
                     Token:        your gateway API key

                   The /anthropic path is the LiteLLM Anthropic passthrough
                   default. If your gateway serves the Anthropic API under a
                   different path, change it (or drop it to use the root).

                Reprint the base URL anytime with:  claude-office url
                Check gateway reachability with:    claude-office doctor
              EOS
            end
          end
          EOF

          echo "generated formula:"; cat claude-office.rb
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/f5-sales-demo/homebrew-tap.git" tap
          cp claude-office.rb tap/claude-office.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add claude-office.rb
          if git diff --cached --quiet; then
            echo "no formula change"
          else
            git commit -m "Update claude-office to ${TAG}"
            git push
          fi
